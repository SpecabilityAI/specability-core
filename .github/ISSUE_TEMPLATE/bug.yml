name: Bug report
description: Installation or runtime problem with Specability Core
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `specability version`.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS arm64
        - macOS amd64
        - Linux amd64
        - Linux arm64
        - Windows amd64
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the exact commands you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Remove secrets, source code, customer data, and private paths before submitting.
